<!DOCTYPE html>
<html>
    <head>
        <title>Image upscaler</title>
    </head>
    <body>
        <script>
            import fs from 'fs';
import { createCanvas, loadImage } from 'canvas';

// Load image and process
async function processImage() {
  const imagePath = "D:/AJVR/128px-Female_house_sparrow_at_Kodai_1.png";
  const image = await loadImage(imagePath);

  const width = image.width;
  const height = image.height;

  const canvas = createCanvas(width, height);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(image, 0, 0, width, height);

  // Get image data as Uint8ClampedArray [r,g,b,a,...]
  let imageData = ctx.getImageData(0, 0, width, height);
  let data = imageData.data;

  // Convert to 3D array [height][width][3]
  let imageArray = [];
  for (let y = 0; y < height; y++) {
    let row = [];
    for (let x = 0; x < width; x++) {
      const idx = (y * width + x) * 4;
      row.push([data[idx], data[idx + 1], data[idx + 2]]);
    }
    imageArray.push(row);
  }

  // Upscale by factor 10 in both dimensions
  let image2 = [];
  for (let y = 0; y < imageArray.length; y++) {
    for (let a = 0; a < 10; a++) {
      let newRow = [];
      for (let x = 0; x < imageArray[y].length; x++) {
        const pixel = imageArray[y][x];
        for (let b = 0; b < 10; b++) {
          newRow.push(pixel);
        }
      }
      image2.push(newRow);
    }
  }

  // Check shape consistency
  const shapex = image2[0].length;
  for (let i = 0; i < image2.length; i++) {
    if (image2[i].length !== shapex) {
      console.log("Kanniet");
      console.log(i);
    }
  }

  // Smooth image 30 iterations
  for (let iter = 0; iter < 30; iter++) {
    for (let y = 0; y < image2.length; y++) {
      for (let x = 0; x < image2[y].length; x++) {
        let rr = [image2[y][x][0]];
        let gg = [image2[y][x][1]];
        let bb = [image2[y][x][2]];

        if (y - 1 >= 0) {
          rr.push(image2[y - 1][x][0]);
          gg.push(image2[y - 1][x][1]);
          bb.push(image2[y - 1][x][2]);
        }
        if (y + 1 < image2.length) {
          rr.push(image2[y + 1][x][0]);
          gg.push(image2[y + 1][x][1]);
          bb.push(image2[y + 1][x][2]);
        }
        if (x - 1 >= 0) {
          rr.push(image2[y][x - 1][0]);
          gg.push(image2[y][x - 1][1]);
          bb.push(image2[y][x - 1][2]);
        }
        if (x + 1 < image2[y].length) {
          rr.push(image2[y][x + 1][0]);
          gg.push(image2[y][x + 1][1]);
          bb.push(image2[y][x + 1][2]);
        }

        const r = rr.reduce((a, b) => a + b, 0) / rr.length;
        const g = gg.reduce((a, b) => a + b, 0) / gg.length;
        const b = bb.reduce((a, b) => a + b, 0) / bb.length;

        image2[y][x] = [r, g, b];
      }
    }
  }

  // Create new canvas for output
  const outCanvas = createCanvas(image2[0].length, image2.length);
  const outCtx = outCanvas.getContext('2d');
  const outImageData = outCtx.createImageData(image2[0].length, image2.length);
  const outData = outImageData.data;

  for (let y = 0; y < image2.length; y++) {
    for (let x = 0; x < image2[y].length; x++) {
      const idx = (y * image2[0].length + x) * 4;
      outData[idx] = Math.round(image2[y][x][0]);
      outData[idx + 1] = Math.round(image2[y][x][1]);
      outData[idx + 2] = Math.round(image2[y][x][2]);
      outData[idx + 3] = 255; // opaque alpha
    }
  }

  outCtx.putImageData(outImageData, 0, 0);

  // Save output image
  const out = fs.createWriteStream('output2.jpg');
  const stream = outCanvas.createJPEGStream();
  stream.pipe(out);
  out.on('finish', () => {
    console.log('The JPEG file was created.');
  });
}

processImage();
        </script>
    </body>
</html>
